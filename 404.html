<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Luis Carrión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #050B18; color: #F0F4FF;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .content { max-width: 480px; }
    .num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 8rem; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg,#4F9CF9,#2DD4BF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 1rem;
    }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem; }
    p { color: #64748B; margin-bottom: 2rem; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg,#4F9CF9,#2DD4BF);
      color: #fff; padding: 12px 28px; border-radius: 100px;
      font-weight: 600; font-size: 0.9rem; text-decoration: none;
      transition: opacity .25s, transform .25s;
    }
    a:hover { opacity: 0.85; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="content">
    <div class="num">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/index.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to Home
    </a>
  </div>
</body>
</html>
