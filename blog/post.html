<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… | Luis Carrión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- marked.js — client-side Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg0: #050B18; --card: rgba(13,21,38,0.85);
      --blue: #4F9CF9; --teal: #2DD4BF; --purple: #A78BFA;
      --txt0: #F0F4FF; --txt1: #CBD5E1; --txt2: #64748B;
      --border: rgba(79,156,249,0.18);
      --grad1: linear-gradient(135deg,#4F9CF9,#2DD4BF);
      --grad2: linear-gradient(135deg,#A78BFA,#4F9CF9);
      --radius: 16px;
      --t: 0.3s cubic-bezier(.4,0,.2,1);
      --accent:    var(--blue);
      --accent-bg: rgba(79,156,249,0.08);
      --accent-bar:var(--grad1);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg0); color: var(--txt0); line-height: 1.8; }
    h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; line-height: 1.3; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg0); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    #progress-bar {
      position: fixed; top: 0; left: 0; height: 3px; width: 0%;
      background: var(--accent-bar); z-index: 200; transition: width .1s linear;
    }

    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(5,11,24,0.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 14px 0;
    }
    .nav-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--txt0); }
    .nav-logo span { color: var(--blue); }
    .nav-back { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--txt2); transition: color var(--t); }
    .nav-back:hover { color: var(--accent); text-decoration: none; }

    /* Loading */
    .loading {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem; color: var(--txt2);
    }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--blue);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-page {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      text-align: center; padding: 24px;
    }
    .error-code {
      font-family: 'Space Grotesk', sans-serif; font-size: 6rem; font-weight: 800; line-height: 1;
      background: var(--grad1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .error-page h2 { font-size: 1.5rem; }
    .error-page p { color: var(--txt2); max-width: 400px; }
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--grad1); color: #fff; padding: 12px 24px;
      border-radius: 100px; font-weight: 600; font-size: 0.875rem;
      transition: opacity .25s, transform .25s; margin-top: 1rem;
    }
    .btn-back:hover { opacity: .85; transform: translateY(-2px); text-decoration: none; }

    /* Article */
    .article-wrap { max-width: 900px; margin: 0 auto; padding: 100px 24px 80px; }
    .article-stripe { height: 5px; border-radius: 3px; background: var(--accent-bar); margin-bottom: 2.5rem; }
    .article-meta { display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; margin-bottom: 1.75rem; }
    .article-cat {
      font-size: 0.7rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 100px; border: 1px solid var(--accent);
      color: var(--accent); background: var(--accent-bg);
    }
    .article-time, .article-date { font-size: 0.8rem; color: var(--txt2); }
    .article-title { font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: 800; margin-bottom: 1rem; }
    .article-subtitle { font-size: 1.1rem; color: var(--txt1); margin-bottom: 2rem; line-height: 1.6; }

    .author-card {
      display: flex; align-items: center; gap: 12px;
      padding: 1.25rem; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); backdrop-filter: blur(12px); margin-bottom: 2.5rem;
    }
    .author-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--accent-bar); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.1rem; flex-shrink: 0;
    }
    .author-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
    .author-role { font-size: 0.8rem; color: var(--txt2); }

    /* Markdown */
    .md-body h2 { font-size: 1.5rem; font-weight: 700; margin: 2.5rem 0 1rem; color: var(--txt0); padding-bottom: .5rem; border-bottom: 1px solid var(--border); }
    .md-body h3 { font-size: 1.15rem; font-weight: 700; margin: 2rem 0 .75rem; color: var(--txt0); }
    .md-body h4 { font-size: 1rem; font-weight: 700; margin: 1.5rem 0 .5rem; color: var(--txt1); }
    .md-body p  { color: var(--txt1); margin-bottom: 1.25rem; font-size: 1.02rem; }
    .md-body ul, .md-body ol { margin: .75rem 0 1.25rem 1.5rem; color: var(--txt1); }
    .md-body li { margin-bottom: .5rem; font-size: 1.02rem; }
    .md-body strong { color: var(--txt0); font-weight: 600; }
    .md-body em { font-style: italic; }
    .md-body a { color: var(--accent); }
    .md-body code {
      font-family: 'JetBrains Mono','Fira Code',monospace;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 6px; font-size: .88em; color: var(--teal);
    }
    .md-body pre {
      background: #0a1628; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.5rem; overflow-x: auto; margin: 1.5rem 0;
    }
    .md-body pre code { background: none; border: none; padding: 0; font-size: .9rem; color: var(--txt1); }
    .md-body blockquote {
      background: var(--accent-bg); border-left: 4px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0; padding: 1.25rem 1.5rem; margin: 1.75rem 0;
    }
    .md-body blockquote p { margin: 0; }
    .md-body blockquote strong { color: var(--accent); }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
    .md-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
    .md-body th, .md-body td { padding: .75rem 1rem; border-bottom: 1px solid var(--border); font-size: .9rem; text-align: left; }
    .md-body th { font-weight: 600; color: var(--txt0); background: rgba(255,255,255,0.04); }
    .md-body td { color: var(--txt1); }

    /* Post nav */
    .post-nav { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 22px; border-radius: 100px; font-weight: 600; font-size: 0.875rem;
      border: 1px solid var(--border); color: var(--txt0);
      transition: border-color var(--t), background var(--t); text-decoration: none;
    }
    .nav-btn:hover { border-color: var(--accent); background: var(--accent-bg); text-decoration: none; }
    .nav-btn.accent { border-color: var(--accent); color: var(--accent); }

    /* TOC */
    @media (min-width: 1300px) {
      .layout { display: grid; grid-template-columns: 1fr 220px; gap: 3rem; align-items: start; max-width: 1120px; margin: 0 auto; }
      .toc {
        position: sticky; top: 90px;
        background: var(--card); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 1.25rem; backdrop-filter: blur(12px);
      }
      .toc-title { font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--txt2); margin-bottom: .75rem; }
      .toc ul { list-style: none; }
      .toc li { margin-bottom: .4rem; }
      .toc a { font-size: .8rem; color: var(--txt2); display: block; transition: color var(--t); }
      .toc a:hover, .toc li.active a { color: var(--accent); font-weight: 600; text-decoration: none; }
      .toc li.h3 { padding-left: .75rem; }
    }
    @media (max-width: 1299px) { .toc { display: none; } }
  </style>
</head>
<body>

<div id="progress-bar"></div>

<nav class="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">LC<span>.</span></a>
    <a href="index.html" class="nav-back">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      All Posts
    </a>
  </div>
</nav>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span>Loading post&hellip;</span>
  </div>
</div>

<script>
  const ACCENTS = {
    blue:   { color:'var(--blue)',   bg:'rgba(79,156,249,0.08)',  bar:'linear-gradient(135deg,#4F9CF9,#2DD4BF)' },
    teal:   { color:'var(--teal)',   bg:'rgba(45,212,191,0.08)',  bar:'linear-gradient(90deg,#2DD4BF,#4F9CF9)'  },
    purple: { color:'var(--purple)', bg:'rgba(167,139,250,0.08)', bar:'linear-gradient(135deg,#A78BFA,#4F9CF9)' },
  };

  function setAccent(key) {
    const a = ACCENTS[key] || ACCENTS.blue;
    const r = document.documentElement;
    r.style.setProperty('--accent',    a.color);
    r.style.setProperty('--accent-bg', a.bg);
    r.style.setProperty('--accent-bar',a.bar);
  }

  function parseFrontMatter(text) {
    const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
    if (!m) return { meta: {}, content: text };
    const meta = {};
    m[1].split('\n').forEach(line => {
      const ci = line.indexOf(':');
      if (ci === -1) return;
      meta[line.slice(0, ci).trim()] = line.slice(ci + 1).trim().replace(/^["']|["']$/g, '');
    });
    return { meta, content: m[2] };
  }

  function showError(title, detail) {
    document.getElementById('app').innerHTML = `
      <div class="error-page">
        <div class="error-code">404</div>
        <h2>${title}</h2>
        <p>${detail}</p>
        <a href="index.html" class="btn-back">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back to Blog
        </a>
      </div>`;
  }

  function buildTOC(mdEl) {
    const hs = Array.from(mdEl.querySelectorAll('h2,h3'));
    if (hs.length < 3) return null;
    const aside = document.createElement('aside');
    aside.className = 'toc';
    const ul = document.createElement('ul');
    hs.forEach(h => {
      const li = document.createElement('li');
      li.className = h.tagName === 'H3' ? 'h3' : '';
      const a = document.createElement('a');
      a.href = `#${h.id}`;
      a.textContent = h.textContent;
      li.appendChild(a);
      ul.appendChild(li);
    });
    aside.innerHTML = '<div class="toc-title">On this page</div>';
    aside.appendChild(ul);
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        const link = ul.querySelector(`a[href="#${e.target.id}"]`);
        if (link) link.parentElement.classList.toggle('active', e.isIntersecting);
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    hs.forEach(h => io.observe(h));
    return aside;
  }

  function configureMarked() {
    const renderer = new marked.Renderer();
    renderer.heading = function(token) {
      const text  = typeof token === 'object' ? (token.text || String(token)) : String(token);
      const level = typeof token === 'object' ? token.depth : arguments[1];
      const id    = text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-');
      return `<h${level} id="${id}">${text}</h${level}>\n`;
    };
    marked.use({ renderer, gfm: true });
  }

  async function loadPost() {
    const slug = new URLSearchParams(window.location.search).get('post');
    if (!slug) { showError('No post specified', 'Add ?post=slug to the URL.'); return; }

    try {
      // Fetch the .md file
      const res = await fetch(`${encodeURIComponent(slug)}.md`);
      if (!res.ok) throw new Error(`Could not load ${slug}.md (HTTP ${res.status})`);
      const raw = await res.text();

      // Fetch slug list for prev/next nav
      let slugs = [];
      try { slugs = await fetch('posts.json').then(r => r.json()); } catch {}

      configureMarked();
      const { meta, content } = parseFrontMatter(raw);
      const accentKey = meta.accent || 'blue';
      setAccent(accentKey);
      document.title = `${meta.title || slug} | Luis Carrión`;

      const html = marked.parse(content);

      // Prev / next
      const idx  = slugs.indexOf(slug);
      const prev = idx > 0 ? slugs[idx - 1] : null;
      const next = idx < slugs.length - 1 ? slugs[idx + 1] : null;

      // Build article DOM
      const article = document.createElement('div');
      article.innerHTML = `
        <div class="article-stripe"></div>
        <div class="article-meta">
          <span class="article-cat">${meta.category || 'Article'}</span>
          <span class="article-time">&#128337; ${meta.readTime || '?'} min read</span>
          <span class="article-date">${meta.date || ''}</span>
        </div>
        <h1 class="article-title">${meta.title || slug}</h1>
        ${meta.subtitle ? `<p class="article-subtitle">${meta.subtitle}</p>` : ''}
        <div class="author-card">
          <div class="author-avatar">LC</div>
          <div>
            <div class="author-name">Luis Orlando Carrión Rumiche</div>
            <div class="author-role">Solution Architect &amp; Business Development Manager · TCS Latin America</div>
          </div>
        </div>
        <div class="md-body">${html}</div>
        <div class="post-nav">
          ${prev ? `<a href="post.html?post=${encodeURIComponent(prev)}" class="nav-btn">&#8592; Previous</a>` : '<span></span>'}
          ${next ? `<a href="post.html?post=${encodeURIComponent(next)}" class="nav-btn accent">Next &#8594;</a>` : '<span></span>'}
        </div>
      `;

      // Layout with optional TOC
      const mdEl = article.querySelector('.md-body');
      const toc  = buildTOC(mdEl);
      const wrap = document.createElement('div');
      wrap.className = 'article-wrap';

      if (toc) {
        const grid = document.createElement('div');
        grid.className = 'layout';
        grid.appendChild(article);
        grid.appendChild(toc);
        wrap.appendChild(grid);
      } else {
        wrap.appendChild(article);
      }

      document.getElementById('app').innerHTML = '';
      document.getElementById('app').appendChild(wrap);

      // Reading progress bar
      const bar = document.getElementById('progress-bar');
      window.addEventListener('scroll', () => {
        const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
        bar.style.width = Math.min(pct, 100) + '%';
      }, { passive: true });

    } catch (err) {
      console.error(err);
      showError('Post not found', err.message);
    }
  }

  loadPost();
</script>
</body>
</html>
